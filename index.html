<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>OtakuNova — Download Manager</title>

<style>
:root{
  --bg:#0d0d0f;
  --panel:#111214;
  --accent:#ff3c3c;
  --muted:#9aa0a6;
  --glass: rgba(255,255,255,0.03);
  --success: #2ecc71;
  --danger:#e74c3c;
  --card-radius:14px;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family: system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  background: linear-gradient(180deg,#070708 0%, #0d0d0f 100%);
  color:#fff;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  padding:20px;
  text-align:center;
}

/* container */
.app{
  max-width:900px;
  margin:18px auto;
  background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
  border-radius:var(--card-radius);
  padding:18px;
  box-shadow: 0 6px 30px rgba(0,0,0,0.6);
  border:1px solid rgba(255,255,255,0.03);
}

/* header */
.header{
  display:flex;
  gap:16px;
  align-items:center;
  justify-content:space-between;
  margin-bottom:14px;
}
.brand{
  display:flex;
  gap:12px;
  align-items:center;
}
.logo{
  width:56px;
  height:56px;
  border-radius:12px;
  background:linear-gradient(135deg,#ff6b6b,#ff3c3c);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:22px;
  box-shadow: 0 6px 20px rgba(255,60,60,0.08);
}
.title{
  text-align:right;
}
.title h1{margin:0;font-size:20px}
.title p{margin:0;color:var(--muted);font-size:13px}

/* controls */
.controls{
  display:flex;
  gap:10px;
  align-items:center;
  justify-content:flex-end;
  flex-wrap:wrap;
  margin-bottom:16px;
}
.input, .input-small{
  background:var(--panel);
  border-radius:10px;
  padding:10px 12px;
  color:#fff;
  border:1px solid rgba(255,255,255,0.03);
  outline:none;
}
.input{flex:1; min-width:180px;}
.input-small{width:130px}
.btn{
  background:var(--accent);
  border:none;
  color:#fff;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  box-shadow: 0 6px 18px rgba(255,60,60,0.08);
}
.btn.ghost{background:transparent;border:1px solid rgba(255,255,255,0.04)}
.btn.small{padding:8px 10px;font-size:14px}

/* downloads list */
.list{
  margin-top:12px;
  display:grid;
  gap:12px;
}
.card{
  background: linear-gradient(180deg, var(--glass), rgba(255,255,255,0.02));
  border-radius:12px;
  padding:12px;
  display:flex;
  gap:12px;
  align-items:center;
  justify-content:space-between;
  border:1px solid rgba(255,255,255,0.03);
}
.left{
  display:flex;
  gap:12px;
  align-items:center;
  min-width:0;
}
.file-ico{
  width:56px;height:56px;border-radius:10px;background:rgba(255,255,255,0.03);
  display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--accent);
}
.meta{ text-align:right; min-width:0 }
.meta .name{font-weight:700; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.meta .sub{color:var(--muted); font-size:13px; margin-top:4px}

/* progress */
.progress-wrap{width:320px; max-width:40vw; min-width:180px; margin-left:8px}
.progress{height:12px;background:rgba(255,255,255,0.03);border-radius:8px;overflow:hidden;display:block}
.progress > i{display:block;height:100%;width:0%; background:linear-gradient(90deg,var(--accent),#ff8653); transition:width 220ms linear}
.status{font-size:13px;color:var(--muted); margin-top:8px; display:flex; gap:8px; align-items:center; justify-content:space-between}

/* actions */
.actions{display:flex;gap:8px;align-items:center}
.small-btn{background:transparent;border:1px solid rgba(255,255,255,0.04);padding:6px 8px;border-radius:8px;color:#fff;cursor:pointer}

/* completed */
.done{color:var(--success); font-weight:700}

/* responsive */
@media(max-width:720px){
  .header{flex-direction:column;align-items:stretch;text-align:center}
  .controls{justify-content:center}
  .progress-wrap{max-width:60vw}
}
</style>
</head>
<body>
  <div class="app" role="main">
    <div class="header">
      <div class="brand">
        <div class="logo">🔥</div>
        <div class="title">
          <h1>OtakuNova</h1>
          <p>قارئ مانغا ذكي — مدير التحميلات التجريبي</p>
        </div>
      </div>

      <div style="text-align:left">
        <button id="clearAll" class="btn ghost small">مسح الكل</button>
      </div>
    </div>

    <!-- controls -->
    <div class="controls" role="region" aria-label="أدوات الإضافة">
      <input id="fileName" class="input" placeholder="اسم الملف (مثال: chapter-1.zip)" aria-label="اسم الملف">
      <input id="fileSize" class="input-small" placeholder="حجم (MB)" aria-label="حجم الملف">
      <button id="addBtn" class="btn">أضف وتنزيل</button>
    </div>

    <!-- downloads list -->
    <div id="downloads" class="list" aria-live="polite"></div>

    <div style="margin-top:12px;color:var(--muted);font-size:13px">
      ملفات محفوظة محليًا في متصفحك — <strong>ليس نشرًا على الإنترنت</strong>.
    </div>
  </div>

<script>
/*
  مدير تنزيلات محلي (محاكاة)
  - يحفظ الحالة في localStorage
  - إيقاف/استئناف/إلغاء
  - شريط تقدم مع تقدير الحجم
*/

const LS_KEY = 'otakunova_downloads_v1';

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

// Load saved
let state = JSON.parse(localStorage.getItem(LS_KEY) || '[]');

// download engine (simulated)
class DownloadItem {
  constructor({id,name,size,progress=0,status='idle'}) {
    this.id = id || uid();
    this.name = name || 'file';
    this.size = Number(size)|| 5; // MB
    this.progress = progress; // 0..100
    this.status = status; // idle, running, paused, done, canceled
    this._interval = null;
    this.speed = this._randSpeed();
  }

  _randSpeed(){
    // speed: percent per second (varies by size so larger files take longer)
    return (Math.random() * 8) + (this.size > 50 ? 0.5 : 1.2);
  }

  start(onUpdate,onComplete){
    if(this.status === 'done' || this.status === 'running') return;
    this.status = 'running';
    this.speed = this._randSpeed();
    const stepMs = 250;
    this._interval = setInterval(()=>{
      // variable increment to feel realistic
      let delta = (this.speed * stepMs) / 1000;
      // add small randomness
      delta *= (0.6 + Math.random()*0.9);
      this.progress = Math.min(100, this.progress + delta);
      if(onUpdate) onUpdate(this);
      if(this.progress >= 100){
        this.complete(onComplete);
      }
    }, stepMs);
  }

  pause(onUpdate){
    if(this._interval) clearInterval(this._interval);
    this._interval = null;
    if(this.status === 'running') this.status = 'paused';
    if(onUpdate) onUpdate(this);
  }

  cancel(onUpdate){
    if(this._interval) clearInterval(this._interval);
    this._interval = null;
    this.status = 'canceled';
    this.progress = 0;
    if(onUpdate) onUpdate(this);
  }

  complete(onComplete){
    if(this._interval) clearInterval(this._interval);
    this._interval = null;
    this.status = 'done';
    this.progress = 100;
    if(onComplete) onComplete(this);
  }
}

// app data
let downloads = state.map(d=> new DownloadItem(d));

// save function
function saveState(){
  const payload = downloads.map(d=> ({
    id:d.id, name:d.name, size:d.size, progress: Math.round(d.progress*100)/100, status:d.status
  }));
  localStorage.setItem(LS_KEY, JSON.stringify(payload));
}

// rendering
const listEl = document.getElementById('downloads');

function formatSize(mb){
  if(mb >= 1024) return (mb/1024).toFixed(2) + ' GB';
  return mb + ' MB';
}

function render(){
  listEl.innerHTML = '';
  if(downloads.length === 0){
    const p = document.createElement('div');
    p.style.color = 'var(--muted)';
    p.style.padding = '24px';
    p.style.border = '1px dashed rgba(255,255,255,0.03)';
    p.style.borderRadius = '12px';
    p.textContent = 'لا توجد تنزيلات — أضف ملفًا بالاسم والحجم ثم اضغط "أضف وتنزيل".';
    listEl.appendChild(p);
    return;
  }

  downloads.forEach(item=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'dl-'+item.id;

    // left
    const left = document.createElement('div'); left.className='left';
    const ico = document.createElement('div'); ico.className='file-ico'; ico.textContent = '📦';
    const meta = document.createElement('div'); meta.className='meta';
    const name = document.createElement('div'); name.className='name'; name.title = item.name;
    name.textContent = item.name;
    const sub = document.createElement('div'); sub.className='sub';
    sub.textContent = formatSize(item.size) + ' • ' + (item.status==='done' ? 'مكتمل' : item.status);
    meta.appendChild(name); meta.appendChild(sub);
    left.appendChild(ico); left.appendChild(meta);

    // progress
    const right = document.createElement('div'); right.style.display='flex'; right.style.alignItems='center'; right.style.gap='12px';
    const progWrap = document.createElement('div'); progWrap.className='progress-wrap';
    const prog = document.createElement('div'); prog.className='progress'; const inner = document.createElement('i');
    inner.style.width = item.progress + '%';
    prog.appendChild(inner);
    const statusLine = document.createElement('div'); statusLine.className='status';
    const perc = document.createElement('div'); perc.textContent = Math.round(item.progress) + '%';
    const statText = document.createElement('div'); statText.style.color='var(--muted)'; statText.style.fontSize='13px';
    statText.textContent = item.status === 'done' ? '✅ تم التحميل' : item.status === 'canceled' ? 'ملغى' : item.status;
    statusLine.appendChild(statText); statusLine.appendChild(perc);
    progWrap.appendChild(prog); progWrap.appendChild(statusLine);

    // actions
    const actions = document.createElement('div'); actions.className='actions';
    // start/pause/resume button
    const startBtn = document.createElement('button'); startBtn.className='small-btn';
    if(item.status === 'running') startBtn.textContent = 'إيقاف';
    else if(item.status === 'done') startBtn.textContent = 'مفتوح';
    else startBtn.textContent = 'تشغيل';

    // cancel button
    const cancelBtn = document.createElement('button'); cancelBtn.className='small-btn';
    cancelBtn.textContent = 'إلغاء';

    // remove button
    const removeBtn = document.createElement('button'); removeBtn.className='small-btn';
    removeBtn.textContent = 'حذف';

    // open / show
    const openBtn = document.createElement('button'); openBtn.className='small-btn';
    openBtn.textContent = item.status === 'done' ? 'فتح' : 'معلومات';

    actions.appendChild(startBtn);
    actions.appendChild(cancelBtn);
    actions.appendChild(removeBtn);
    actions.appendChild(openBtn);

    right.appendChild(progWrap); right.appendChild(actions);

    card.appendChild(left); card.appendChild(right);
    listEl.appendChild(card);

    // handlers
    function updateView(it){
      inner.style.width = it.progress + '%';
      perc.textContent = Math.round(it.progress) + '%';
      statText.textContent = it.status === 'done' ? '✅ تم التحميل' : it.status === 'canceled' ? 'ملغى' : it.status;
      if(it.status === 'running') startBtn.textContent = 'إيقاف';
      else if(it.status === 'paused') startBtn.textContent = 'استئناف';
      else if(it.status === 'done') startBtn.textContent = 'مفتوح';
      else startBtn.textContent = 'تشغيل';
      // dim buttons if canceled/done
      cancelBtn.disabled = (it.status === 'canceled' || it.status === 'done');
    }

    startBtn.addEventListener('click', ()=>{
      if(item.status === 'running'){
        item.pause(updateAndSave);
      } else if(item.status === 'paused' || item.status === 'idle'){
        item.start(updateAndSave, completeAndSave);
      } else if(item.status === 'done'){
        alert('الملف مفتوح (محاكاة). اسم الملف: ' + item.name);
      } else {
        // if canceled -> restart from 0
        item.progress = 0;
        item.status = 'idle';
        item.start(updateAndSave, completeAndSave);
      }
      updateView(item);
      saveState();
    });

    cancelBtn.addEventListener('click', ()=>{
      if(confirm('هل تريد إلغاء هذا التنزيل؟')){
        item.cancel(updateAndSave);
        updateView(item);
        saveState();
      }
    });

    removeBtn.addEventListener('click', ()=>{
      if(confirm('حذف العنصر نهائيًا؟')){
        // stop interval and remove from array
        item.cancel();
        downloads = downloads.filter(d => d.id !== item.id);
        saveState();
        render();
      }
    });

    openBtn.addEventListener('click', ()=>{
      if(item.status === 'done'){
        alert('فتح الملف (محاكاة): ' + item.name);
      } else {
        alert('معلومات: ' + item.name + '\\nالحجم: ' + formatSize(item.size) + '\\nالتقدم: ' + Math.round(item.progress) + '%\\nالحالة: ' + item.status);
      }
    });

    // reflect initial state
    updateView(item);
  });
}

// helper to update single item view and save
function updateAndSave(it){
  // do UI update for that card
  const card = document.getElementById('dl-'+it.id);
  if(card){
    const inner = card.querySelector('.progress > i');
    const perc = card.querySelector('.status div:last-child');
    const statText = card.querySelector('.status div:first-child');
    inner.style.width = it.progress + '%';
    perc.textContent = Math.round(it.progress) + '%';
    statText.textContent = it.status === 'done' ? '✅ تم التحميل' : it.status;
  }
  saveState();
}

function completeAndSave(it){
  updateAndSave(it);
  // small celebration
  try{
    const card = document.getElementById('dl-'+it.id);
    if(card){
      card.style.boxShadow = '0 10px 30px rgba(46,204,113,0.06)';
    }
  }catch(e){}
  saveState();
}

// controls binding
document.getElementById('addBtn').addEventListener('click', ()=>{
  const name = document.getElementById('fileName').value.trim() || ('file-' + (downloads.length+1));
  const sizeVal = Number(document.getElementById('fileSize').value) || (Math.floor(Math.random()*80)+2);
  const item = new DownloadItem({name, size:sizeVal});
  downloads.unshift(item);
  saveState();
  render();
  // start immediately
  item.start(updateAndSave, completeAndSave);
});

// clear all
document.getElementById('clearAll').addEventListener('click', ()=>{
  if(confirm('هل تريد مسح كل التنزيلات وحالتها المحفوظة؟')){
    downloads.forEach(d => d.cancel());
    downloads = [];
    saveState();
    render();
  }
});

// restore running items on load (do not auto-start completed)
function resumeRunning(){
  downloads.forEach(d=>{
    if(d.status === 'running'){
      d.start(updateAndSave, completeAndSave);
    }
  });
}

// initial render
render();
resumeRunning();

// autosave periodically
setInterval(saveState, 5000);

// keyboard: Enter in fileSize triggers add
document.getElementById('fileSize').addEventListener('keydown', (e)=>{
  if(e.key === 'Enter') document.getElementById('addBtn').click();
});

// nice: when page unload, pause intervals (to avoid errors)
window.addEventListener('beforeunload', ()=>{
  downloads.forEach(d => d.pause());
  saveState();
});
</script>
</body>
</html>
